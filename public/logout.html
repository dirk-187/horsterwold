<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uitgelogd — Horsterwold</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="logo/logo_bliksem.png">
    <style>
        :root {
            --primary: #2563eb;
            --bg: #1a365d;
            --text: #f8fafc;
            --glass: rgba(255, 255, 255, 0.95);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .container {
            background: var(--glass);
            color: #0f172a;
            padding: 3rem 2rem;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 480px;
            width: 90%;
            animation: fadeIn 0.6s ease-out;
        }
        .logos {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2rem;
            margin-bottom: 2.5rem;
        }
        .logos img {
            height: 60px;
            object-fit: contain;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            color: #1e293b;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #475569;
            margin-bottom: 2.5rem;
        }
        .btn {
            display: inline-block;
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.5);
            background: #1d4ed8;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logos">
            <img src="logo/logo_VVE.jpg" alt="Logo VVE">
            <img src="logo/logo_gaswaterlicht.png" alt="Logo Horsterwold">
        </div>
        <h1>Uitgelogd</h1>
        <p>Deze pagina mag gesloten worden</p>
        
    </div>
</body>
</html>
